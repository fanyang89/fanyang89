name: Update README

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  schedule:
    # Runs every first and 12 hrs.
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    name: Update README with recent merged pull requests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update merged pull requests in README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')

            const username = 'fanyang89'
            const readmePath = 'README.md'
            const startMarker = '<!--START_SECTION:activity-->'
            const endMarker = '<!--END_SECTION:activity-->'
            const maxRepos = 10
            const maxPullRequestsPerRepo = 5

            const query = `
              query RecentMergedPullRequests($query: String!) {
                search(query: $query, type: ISSUE, first: 100) {
                  nodes {
                    ... on PullRequest {
                      title
                      number
                      url
                      mergedAt
                      repository {
                        nameWithOwner
                        isPrivate
                      }
                    }
                  }
                }
              }
            `

            const response = await github.graphql(query, {
              query: `author:${username} is:pr is:merged sort:updated-desc`,
            })

            const pullRequests = response.search.nodes
              .filter((pr) => pr && pr.mergedAt && pr.repository && !pr.repository.isPrivate)
              .sort((left, right) => new Date(right.mergedAt) - new Date(left.mergedAt))

            const escapeTitle = (title) => title.replace(/[\\\[\]]/g, '\\$&')
            const groupedPullRequests = new Map()

            for (const pr of pullRequests) {
              const repo = pr.repository.nameWithOwner

              if (!groupedPullRequests.has(repo)) {
                if (groupedPullRequests.size === maxRepos) {
                  continue
                }

                groupedPullRequests.set(repo, [])
              }

              const repoPullRequests = groupedPullRequests.get(repo)
              if (repoPullRequests.length < maxPullRequestsPerRepo) {
                repoPullRequests.push(pr)
              }
            }

            const content = groupedPullRequests.size
              ? Array.from(groupedPullRequests.entries())
                  .map(([repo, prs]) => {
                    const lines = prs
                      .map((pr) => `- 🔀 [#${pr.number} ${escapeTitle(pr.title)}](${pr.url})`)
                      .join('\n')
                    return `### ${repo}\n${lines}`
                  })
                  .join('\n\n')
              : '- No merged pull requests found.'

            const readme = fs.readFileSync(readmePath, 'utf8')
            const startIndex = readme.indexOf(startMarker)
            const endIndex = readme.indexOf(endMarker)

            if (startIndex === -1 || endIndex === -1 || endIndex < startIndex) {
              throw new Error('README activity markers not found')
            }

            const updatedReadme = `${readme.slice(0, startIndex + startMarker.length)}\n${content}\n${readme.slice(endIndex)}`

            fs.writeFileSync(readmePath, updatedReadme)

      - name: Commit README updates
        run: |
          if git diff --quiet -- README.md; then
            exit 0
          fi

          git add README.md
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m 'docs(readme): update merged pull requests'
          git push
